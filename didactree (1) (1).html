<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Didactree — Werkvormkiezer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#2D6A4F;--green-light:#B7E4C7;--green-mid:#52B788;--green-pale:#F0FAF4;
  --ink:#1a2e1e;--muted:#5a7a62;--border:#cce3d4;--bg:#f8fdf9;--white:#ffffff;
  --radius:12px;--radius-sm:8px;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;line-height:1.6}
h1,h2,h3,.serif{font-family:'Fraunces',serif}

.header{background:var(--green);color:white;padding:2.5rem 2rem 2rem;position:relative;overflow:hidden}
.header::before{content:'';position:absolute;right:-60px;top:-60px;width:280px;height:280px;border-radius:50%;background:rgba(255,255,255,.06)}
.header::after{content:'';position:absolute;right:40px;bottom:-40px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.04)}
.header-inner{max-width:720px;margin:0 auto;position:relative}
.header h1{font-size:2.4rem;font-weight:600;letter-spacing:-.02em;line-height:1.15;margin-bottom:.5rem}
.header h1 em{font-style:italic;font-weight:400}
.header p{font-size:.95rem;opacity:.8;max-width:420px}
.leaf{display:inline-block;margin-right:.4rem;font-size:1.1em}

.main{max-width:720px;margin:0 auto;padding:2rem 1.5rem}

.theme-nav{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:2rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border)}
.tn{font-size:12px;padding:5px 14px;border-radius:999px;border:1px solid var(--border);background:var(--white);color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.tn:hover{border-color:var(--green-mid);color:var(--green)}
.tn.active{background:var(--green);color:white;border-color:var(--green)}
.badge{font-size:10px;padding:1px 6px;border-radius:999px;background:var(--green-light);color:var(--green);margin-left:5px;vertical-align:middle}
.tn.active .badge{background:rgba(255,255,255,.25);color:white}

.step{display:none;animation:fi .2s ease}
.step.active{display:block}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

.step-label{font-size:11px;font-weight:500;color:var(--muted);letter-spacing:.07em;text-transform:uppercase;margin-bottom:.4rem}
.prog{display:flex;gap:4px;margin-bottom:1.25rem}
.pd{height:3px;border-radius:2px;background:var(--border);flex:1}
.pd.done{background:var(--green-mid)}
.pd.cur{background:var(--green)}

.step-q{font-family:'Fraunces',serif;font-size:1.5rem;font-weight:600;color:var(--ink);margin-bottom:1.25rem;line-height:1.3}

.opts{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px}
.ob{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;text-align:left;cursor:pointer;color:var(--ink);font-family:'DM Sans',sans-serif;transition:all .15s}
.ob:hover{border-color:var(--green-mid);background:var(--green-pale);transform:translateY(-1px)}
.ob .ot{font-weight:500;font-size:14px;display:block;margin-bottom:2px}
.ob .os{font-size:12px;color:var(--muted)}

.bc{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.25rem}
.crumb{font-size:12px;background:var(--green-pale);border:1px solid var(--green-light);border-radius:999px;padding:3px 10px;color:var(--green)}

.rc{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin-bottom:1rem}
.rc-label{font-size:11px;font-weight:500;color:var(--muted);letter-spacing:.07em;text-transform:uppercase;margin-bottom:.3rem}
.rc-title{font-family:'Fraunces',serif;font-size:1.6rem;font-weight:600;color:var(--ink);margin-bottom:.75rem}
.rmeta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem}
.tag{font-size:12px;padding:3px 11px;border-radius:999px;border:1px solid var(--border);color:var(--muted);background:var(--bg);display:flex;align-items:center;gap:4px}
.rs{margin-bottom:1rem}
.rs h3{font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.4rem}
.rs p,.rs li{font-size:14px;color:var(--ink);line-height:1.65}
.rs ol{padding-left:1.2rem}
.rs ol li{margin-bottom:3px}

.pdf-btn{display:inline-flex;align-items:center;gap:7px;margin-top:.5rem;font-size:13px;font-weight:500;color:var(--green);background:var(--green-pale);border:1px solid var(--green-light);border-radius:var(--radius-sm);padding:8px 16px;cursor:pointer;text-decoration:none;transition:all .15s}
.pdf-btn:hover{background:var(--green-light)}
.pdf-btn svg{width:15px;height:15px;flex-shrink:0}

.also{margin-top:1.25rem}
.also h3{font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.5rem}
.matches{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:7px}
.mp{font-size:13px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 12px;color:var(--muted);cursor:pointer;transition:all .15s}
.mp:hover{border-color:var(--green-mid);color:var(--green);background:var(--green-pale)}
.mp span{display:block;font-size:11px;color:var(--muted);margin-top:1px}

.back-row{display:flex;gap:1rem;flex-wrap:wrap;margin-top:1rem}
.back{font-size:13px;background:none;border:none;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;padding:0;display:flex;align-items:center;gap:4px;transition:color .15s}
.back:hover{color:var(--green)}

.coming{font-size:14px;color:var(--muted);background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;line-height:1.7}
.coming strong{color:var(--ink)}

footer{text-align:center;padding:2rem;font-size:12px;color:var(--muted);border-top:1px solid var(--border);margin-top:2rem}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <h1><em>Didactree</em> 🌿</h1>
    <p>Vind in vier stappen de werkvorm die past bij jouw les.</p>
  </div>
</div>

<div class="main">

  <div style="margin-bottom:1.5rem">
    <div style="font-size:11px;font-weight:500;color:var(--muted);letter-spacing:.07em;text-transform:uppercase;margin-bottom:.6rem">Thema</div>
    <div class="theme-nav">
      <button class="tn active" onclick="setTheme('begrippen',this)">Begrippen leren <span class="badge">volledig</span></button>
      <button class="tn" onclick="setTheme('classificeren',this)">Classificeren</button>
      <button class="tn" onclick="setTheme('mening',this)">Meningsvorming</button>
      <button class="tn" onclick="setTheme('relateren',this)">Relateren</button>
      <button class="tn" onclick="setTheme('vergelijken',this)">Vergelijken</button>
      <button class="tn" onclick="setTheme('voorspellen',this)">Voorspellen</button>
      <button class="tn" onclick="setTheme('waarderen',this)">Waarderen</button>
      <button class="tn" onclick="setTheme('waarnemen',this)">Waarnemen</button>
    </div>
  </div>

  <div id="flowBegrippen">
    <div id="s0" class="step active">
      <div class="step-label">Stap 1 van 4</div>
      <div class="prog"><div class="pd cur"></div><div class="pd"></div><div class="pd"></div><div class="pd"></div></div>
      <div class="step-q">Wat is het doel?</div>
      <div class="opts">
        <button class="ob" onclick="pick(0,'doel','leren')"><span class="ot">Nieuwe begrippen leren</span><span class="os">Leerlingen maken kennis met nieuwe termen</span></button>
        <button class="ob" onclick="pick(0,'doel','herhalen')"><span class="ot">Begrippen herhalen</span><span class="os">Eerder aangeleerd, nu vastzetten of toetsen</span></button>
      </div>
    </div>

    <div id="s1" class="step">
      <div class="bc" id="bc1"></div>
      <div class="step-label">Stap 2 van 4</div>
      <div class="prog"><div class="pd done"></div><div class="pd cur"></div><div class="pd"></div><div class="pd"></div></div>
      <div class="step-q">Hoe groot is de groep?</div>
      <div class="opts">
        <button class="ob" onclick="pick(1,'groep','individueel')"><span class="ot">Individueel</span></button>
        <button class="ob" onclick="pick(1,'groep','tweetal')"><span class="ot">Tweetallen</span></button>
        <button class="ob" onclick="pick(1,'groep','groepje')"><span class="ot">Groepjes (3–4)</span></button>
        <button class="ob" onclick="pick(1,'groep','klassikaal')"><span class="ot">Klassikaal</span></button>
      </div>
      <button class="back" onclick="back(0)">← Terug</button>
    </div>

    <div id="s2" class="step">
      <div class="bc" id="bc2"></div>
      <div class="step-label">Stap 3 van 4</div>
      <div class="prog"><div class="pd done"></div><div class="pd done"></div><div class="pd cur"></div><div class="pd"></div></div>
      <div class="step-q">Hoeveel tijd heb je?</div>
      <div class="opts">
        <button class="ob" onclick="pick(2,'tijd','kort')"><span class="ot">Kort</span><span class="os">10–20 minuten</span></button>
        <button class="ob" onclick="pick(2,'tijd','middel')"><span class="ot">Middel</span><span class="os">20–30 minuten</span></button>
        <button class="ob" onclick="pick(2,'tijd','lang')"><span class="ot">Lang</span><span class="os">30–50 minuten</span></button>
      </div>
      <button class="back" onclick="back(1)">← Terug</button>
    </div>

    <div id="s3" class="step">
      <div class="bc" id="bc3"></div>
      <div class="step-label">Stap 4 van 4</div>
      <div class="prog"><div class="pd done"></div><div class="pd done"></div><div class="pd done"></div><div class="pd cur"></div></div>
      <div class="step-q">Op welk moment in de les(senserie)?</div>
      <div class="opts">
        <button class="ob" onclick="pick(3,'moment','begin')"><span class="ot">Begin</span><span class="os">Introductie of voorkennis ophalen</span></button>
        <button class="ob" onclick="pick(3,'moment','midden')"><span class="ot">Midden</span><span class="os">Verwerking tijdens de lessenserie</span></button>
        <button class="ob" onclick="pick(3,'moment','einde')"><span class="ot">Einde</span><span class="os">Afsluiting of herhaling na de serie</span></button>
      </div>
      <button class="back" onclick="back(2)">← Terug</button>
    </div>

    <div id="sResult" class="step">
      <div class="bc" id="bcR"></div>
      <div id="resultContent"></div>
      <div class="back-row">
        <button class="back" onclick="back(3)">← Ander moment</button>
        <button class="back" onclick="reset()">↺ Opnieuw beginnen</button>
      </div>
    </div>
  </div>

  <div id="flowOther" style="display:none">
    <div class="coming" id="otherContent"></div>
    <div class="back-row" style="margin-top:1rem">
      <button class="back" onclick="setTheme('begrippen', document.querySelector('.tn'))">← Terug naar begrippen leren</button>
    </div>
  </div>

</div>

<footer>Didactree &mdash; groeit mee met jullie vakkennis &nbsp;🌱</footer>

  waarnemen:{label:'Waarnemen',wv:['Kaartbeeld','Wat zie je']},
};

function setTheme(t, btn) {
  document.querySelectorAll('.tn').forEach(b => b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  if(t==='begrippen'){
    document.getElementById('flowBegrippen').style.display='';
    document.getElementById('flowOther').style.display='none';
    reset();
  } else {
    document.getElementById('flowBegrippen').style.display='none';
    document.getElementById('flowOther').style.display='';
    const th=OTHER[t];
    document.getElementById('otherContent').innerHTML=`<strong>${th.label}</strong><br><br>Werkvormen in dit thema: <em>${th.wv.join(', ')}</em>.<br><br>Volledige instructiekaarten voor dit thema worden binnenkort toegevoegd aan de Didactree.`;
  }
}

function scoreW(w){
  const tM={kort:['kort'],middel:['middel','kort'],lang:['lang','middel']};
  const gM={individueel:['individueel','klassikaal'],tweetal:['tweetal'],groepje:['groepje','tweetal'],klassikaal:['klassikaal','individueel']};
  const mM={begin:['begin'],midden:['midden','einde'],einde:['einde','midden']};
  let s=0;
  if(w.doel.includes(C.doel)) s+=3;
  if(w.groepen.some(g=>(gM[C.groep]||[]).includes(g))) s+=2;
  if(w.tijd.some(t=>(tM[C.tijd]||[]).includes(t))) s+=2;
  if(w.moment.some(m=>(mM[C.moment]||[]).includes(m))) s+=2;
  return s;
}

function pdfBtn(naam) {
  if (!naam || !PDF_B64[naam]) return '';
  return `<a class="pdf-btn" href="data:application/pdf;base64,${PDF_B64[naam]}" download="Didactree_${naam.replace(/ /g,'_')}.pdf">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
    Download instructiekaart (PDF)</a>`;
}

function renderWV(w, label) {
  return `<div class="rc">
    <div class="rc-label">${label}</div>
    <div class="rc-title">${w.naam}</div>
    <div class="rmeta">
      <span class="tag">⏱ ${w.duur}</span>
      <span class="tag">👥 ${w.opzet}</span>
    </div>
    <div class="rs"><h3>Wat is het</h3><p>${w.beschrijving}</p></div>
    <div class="rs"><h3>Aanpak</h3><ol>${w.stappen.map(s=>`<li>${s}</li>`).join('')}</ol></div>
    <div class="rs"><h3>Tip</h3><p>${w.tip}</p></div>
    ${pdfBtn(w.pdf)}
  </div>`;
}

function renderResult(){
  const ranked=WV.map(w=>({...w,s:scoreW(w)})).filter(w=>w.s>=4).sort((a,b)=>b.s-a.s);
  if(!ranked.length){
    document.getElementById('resultContent').innerHTML='<div class="rc"><p style="font-size:14px;color:var(--muted)">Geen exacte match voor deze combinatie. Probeer een andere groepsgrootte of tijdsduur.</p></div>';
    return;
  }
  const best=ranked[0];
  const rest=ranked.slice(1,5);
  let html=renderWV(best,'Beste match');
  if(rest.length){
    html+=`<div class="also"><h3>Ook geschikt</h3><div class="matches">${rest.map(r=>`<div class="mp" onclick="showAlt('${r.naam.replace(/'/g,"\'")}')"><strong>${r.naam}</strong><span>${r.duur}</span></div>`).join('')}</div></div>`;
  }
  document.getElementById('resultContent').innerHTML=html;
}

function showAlt(naam){
  const w=WV.find(x=>x.naam===naam);
  if(w) document.getElementById('resultContent').innerHTML=renderWV(w,'Alternatieve keuze');
}

function pick(step,key,val){
  C[key]=val;
  if(step<3){showStep(step+1);updateBC('bc'+(step+1));}
  else{renderResult();updateBC('bcR');showStep('Result');}
}

function showStep(id){
  document.querySelectorAll('#flowBegrippen .step').forEach(s=>s.classList.remove('active'));
  document.getElementById('s'+id).classList.add('active');
}

function back(to){
  if(to<=0){delete C.groep;delete C.tijd;delete C.moment;}
  if(to<=1){delete C.tijd;delete C.moment;}
  if(to<=2){delete C.moment;}
  showStep(to);
}

function reset(){
  Object.keys(C).forEach(k=>delete C[k]);
  showStep(0);
}

function updateBC(id){
  const el=document.getElementById(id);
  if(!el) return;
  const LBL={leren:'Begrippen leren',herhalen:'Begrippen herhalen',individueel:'Individueel',tweetal:'Tweetallen',groepje:'Groepjes (3–4)',klassikaal:'Klassikaal',kort:'Kort (10–20 min)',middel:'Middel (20–30 min)',lang:'Lang (30–50 min)',begin:'Begin les',midden:'Midden lessenserie',einde:'Einde les/serie'};
  el.innerHTML=Object.values(C).map(v=>`<span class="crumb">${LBL[v]||v}</span>`).join('');
}
